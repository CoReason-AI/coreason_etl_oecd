[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coreason-etl-oecd-health"
version = "0.1.0"
description = "Type A pipeline for ingesting, normalizing, and serving the OECD Health Statistics database."
authors = [
    { name = "Lead Data Engineer", email = "engineering@coreason.example.com" }
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "dlt[postgres]>=0.4.0",
    "dbt-postgres>=1.7.0",
    "pydantic>=2.0.0",
    "requests>=2.31.0",
    "urllib3>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "responses>=0.24.0",
    "ruff>=0.3.0",
    "mypy>=1.9.0",
    "pre-commit>=3.6.0",
    "types-requests>=2.31.0",
    "zensical>=0.0.27",
    "mkdocstrings[python]>=0.24.0"
]

[tool.hatch.build.targets.wheel]
packages = ["src/coreason_etl_oecd_health"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "C", "B"]
ignore = []

[tool.pytest.ini_options]
addopts = "--cov=coreason_etl_oecd_health --cov-report=term-missing --cov-fail-under=100"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = [
    "dlt.*",
    "dbt.*",
]
ignore_missing_imports = true
