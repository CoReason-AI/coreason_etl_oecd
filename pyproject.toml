[project]
name = "coreason-etl-oecd-health"
version = "0.1.0"
description = "Type A pipeline for ingesting, normalizing, and serving the OECD Health Statistics database."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "dlt[postgres]",
    "dbt-postgres",
    "pydantic",
    "requests",
    "urllib3",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "responses",
    "ruff",
    "pre-commit",
    "mypy",
    "types-requests"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 120

[tool.mypy]
strict = true
