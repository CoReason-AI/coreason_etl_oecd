[project]
site_name = "coreason_etl_oecd"
site_url = "https://.github.io/coreason_etl_oecd/"
repo_url = "https://github.com//coreason_etl_oecd"
docs_dir = "docs"
site_dir = "site"

[project.theme]
features = [
    "navigation.instant",
    "navigation.tracking",
    "navigation.tabs",
    "toc.integrate",
    "search.suggest",
    "search.highlight"
]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_root_heading = true
show_bases = true
show_signature_annotations = true
